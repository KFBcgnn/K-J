<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Luxury Wedding Invitation</title>
  <style>
    :root {
      --beige: #f3eadb;
      --ivory: #fffdfa;
      --gold: #b68a3d;
      --gold-soft: #e8d6ae;
      --ink: #4f3c22;
      --lux-ease: cubic-bezier(0.22, 0.78, 0.2, 1);
      --shadow-deep: 0 22px 52px rgba(69, 44, 15, 0.34);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      background: linear-gradient(170deg, #f9f2e6, #efdfc2 52%, #e8d6b2);
      overflow: hidden;
      font-family: "Georgia", "Times New Roman", serif;
    }

    .side-florals {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .floral {
      position: absolute;
      top: 50%;
      width: min(220px, 24vw);
      height: min(460px, 62vh);
      opacity: 0.48;
      transition: opacity 1s var(--lux-ease);
    }

    .floral svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(120, 82, 28, 0.12));
    }

    .floral-left {
      left: calc((100vw - min(100vw, 460px)) / 4);
      transform: translate(-50%, -50%);
    }

    .floral-right {
      right: calc((100vw - min(100vw, 460px)) / 4);
      transform: translate(50%, -50%) scaleX(-1);
    }

    .floral-accent {
      position: absolute;
      width: min(130px, 15vw);
      height: min(190px, 26vh);
      opacity: 0.32;
      pointer-events: none;
    }

    .floral-accent svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 3px 10px rgba(100, 70, 24, 0.1));
    }

    .floral-accent-lt {
      left: calc((100vw - min(100vw, 460px)) / 4 - 48px);
      top: 6%;
      transform: translateX(-40%);
    }

    .floral-accent-lb {
      left: calc((100vw - min(100vw, 460px)) / 4 - 42px);
      bottom: 5%;
      top: auto;
      transform: translateX(-38%);
    }

    .floral-accent-rt {
      right: calc((100vw - min(100vw, 460px)) / 4 - 48px);
      top: 6%;
      transform: translateX(40%) scaleX(-1);
    }

    .floral-accent-rb {
      right: calc((100vw - min(100vw, 460px)) / 4 - 42px);
      bottom: 5%;
      top: auto;
      transform: translateX(38%) scaleX(-1);
    }

    .floral-vignette {
      position: absolute;
      width: min(90px, 10vw);
      height: min(120px, 16vh);
      opacity: 0.22;
    }

    .floral-vignette svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .floral-v-l {
      left: calc((100vw - min(100vw, 460px)) / 4 - 8px);
      top: 38%;
      transform: translateX(-55%);
    }

    .floral-v-r {
      right: calc((100vw - min(100vw, 460px)) / 4 - 8px);
      top: 38%;
      transform: translateX(55%) scaleX(-1);
    }

    @media (max-width: 520px) {
      .side-florals {
        display: none;
      }
    }

    .app {
      position: fixed;
      inset: 0;
      min-height: 100dvh;
      min-height: 100svh;
      height: 100dvh;
      height: 100svh;
      width: 100%;
      z-index: 2;
      background: transparent;
    }

    .scene {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(0);
      transition: opacity 900ms var(--lux-ease), transform 1100ms var(--lux-ease), filter 900ms var(--lux-ease), visibility 900ms;
    }

    .scene.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .frame {
      position: relative;
      width: min(100vw, 460px);
      min-height: 100dvh;
      height: 100dvh;
      height: 100svh;
      min-height: 100svh;
      overflow: hidden;
      background: linear-gradient(180deg, #fcf8ef, #f4e6cb);
      box-shadow: 0 0 0 1px rgba(182, 138, 61, 0.22);
    }

    #scene1 .frame {
      background: linear-gradient(170deg, #f9f2e6, #efdfc2 52%, #e8d6b2);
    }

    .hero-bg {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: -2px;
      min-height: 100%;
      background-image:
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.32), transparent 36%),
        radial-gradient(circle at 76% 80%, rgba(255, 214, 139, 0.2), transparent 42%),
        linear-gradient(rgba(22, 14, 5, 0.22), rgba(22, 14, 5, 0.22)),
        url("envelope.jpg");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      transform: scale(1.03);
      animation: slowZoom 8.8s ease-in-out infinite alternate;
      transition: transform 1200ms var(--lux-ease), opacity 900ms var(--lux-ease), filter 900ms var(--lux-ease);
    }

    .initials {
      position: absolute;
      inset: auto 0 50%;
      transform: translateY(50%);
      text-align: center;
      z-index: 5;
      color: #f6e7c2;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      letter-spacing: 0.08em;
    }

    .initials strong {
      display: block;
      font-size: clamp(2.6rem, 11vw, 3.4rem);
      font-weight: 500;
      color: #eecf92;
    }

    .initials span {
      display: block;
      margin-top: 6px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      opacity: 0.92;
    }

    .start-hint {
      position: absolute;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      color: #f6e8c8;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      animation: pulse 2.6s ease-in-out infinite;
      white-space: nowrap;
      z-index: 6;
    }

    .tap-layer {
      position: absolute;
      inset: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      z-index: 8;
    }

    #scene1.blur-fade .hero-bg {
      filter: blur(8px);
      opacity: 0;
      transform: scale(1.12);
    }

    #scene2 .frame {
      display: grid;
      place-items: center;
      transform-origin: center center;
      transition: transform 2300ms cubic-bezier(0.16, 0.84, 0.24, 1), filter 2300ms cubic-bezier(0.16, 0.84, 0.24, 1), opacity 1200ms var(--lux-ease);
    }

    #scene2.zoom-in .frame {
      transform: scale(1.1);
      filter: blur(0.8px);
    }

    #scene2 .frame {
      overflow: visible;
    }

    .envelope-open {
      width: min(84vw, 360px);
      aspect-ratio: 16 / 10;
      position: relative;
      overflow: visible;
      filter: drop-shadow(0 16px 34px rgba(76, 49, 16, 0.2));
      transform: scale(0.98);
      transition: transform 1900ms var(--lux-ease), opacity 1100ms var(--lux-ease);
    }

    .env-body {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #fbf1de 0%, #f1ddba 58%, #e3c391 100%);
      border: 1px solid rgba(188, 146, 78, 0.42);
      box-shadow:
        inset 0 1px 0 rgba(255, 251, 242, 0.92),
        inset 0 -10px 20px rgba(140, 96, 34, 0.2),
        0 10px 24px rgba(108, 72, 23, 0.14);
      overflow: hidden;
    }

    .env-body::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 18px 28px rgba(255, 252, 245, 0.42),
        inset 0 -16px 24px rgba(128, 88, 31, 0.14);
    }

    .env-flap {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 58%;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      border-radius: 14px 14px 0 0;
      background: linear-gradient(180deg, #fff7e7 0%, #efd5a6 60%, #dcb77c 100%);
      border: 1px solid rgba(184, 142, 73, 0.44);
      border-bottom: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 252, 243, 0.9),
        inset 0 -10px 14px rgba(138, 95, 33, 0.2);
      transform-origin: top;
      transition: transform 2700ms cubic-bezier(0.2, 0.75, 0.2, 1);
      z-index: 4;
    }

    .env-flap::before {
      content: "";
      position: absolute;
      inset: 8% 6% auto;
      height: 44%;
      border-radius: 0 0 50% 50%;
      background: radial-gradient(70% 100% at 50% 0, rgba(255, 254, 247, 0.7), transparent 70%);
      pointer-events: none;
    }

    .env-seal {
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -52%);
      width: 78px;
      height: 94px;
      border-radius: 0;
      background: none;
      border: none;
      padding: 0 0 14px;
      display: block;
      z-index: 6;
      overflow: visible;
      transition: opacity 900ms ease;
      filter:
        drop-shadow(0 6px 10px rgba(55, 32, 8, 0.42))
        drop-shadow(0 2px 4px rgba(100, 68, 22, 0.22))
        drop-shadow(0 -1px 2px rgba(255, 248, 220, 0.35));
    }

    .env-seal .wax-svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .wax-initials {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -54%);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #3d2a0c;
      text-shadow:
        0 1px 0 rgba(255, 248, 228, 0.65),
        0 -0.5px 0 rgba(90, 58, 18, 0.2);
      pointer-events: none;
      line-height: 1;
    }

    .letter-ghost {
      position: absolute;
      left: 7%;
      right: 7%;
      bottom: 6%;
      height: 84%;
      background: linear-gradient(180deg, rgba(255, 253, 248, 0.92), rgba(246, 234, 207, 0.78));
      border: 1px solid rgba(204, 165, 95, 0.52);
      border-radius: 10px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 249, 0.92);
      transform: translateY(32%) scale(0.97);
      transition: transform 2400ms cubic-bezier(0.2, 0.75, 0.2, 1);
      z-index: 2;
      overflow: visible;
    }

    .letter-rings {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -54%) rotate(-7deg);
      width: 58px;
      height: 38px;
      z-index: 3;
      pointer-events: none;
      opacity: 0.92;
      filter:
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.5))
        drop-shadow(0 2px 5px rgba(74, 58, 38, 0.18));
    }

    .letter-rings svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .envelope-open::before {
      content: "";
      position: absolute;
      inset: -10% -6% auto;
      height: 40%;
      background: radial-gradient(55% 100% at 50% 0, rgba(255, 237, 191, 0.36), transparent 72%);
      pointer-events: none;
      z-index: 7;
    }

    .envelope-open::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(147, 102, 35, 0.35), transparent);
      pointer-events: none;
      z-index: 6;
    }

    .envelope-open.open .env-flap {
      transform: rotateX(186deg);
    }

    .envelope-open.open .env-seal {
      opacity: 0;
    }

    .envelope-open.open .letter-ghost {
      transform: translateY(-16%) scale(1);
    }

    #scene2.zoom-in .envelope-open {
      transform: scale(1.06);
    }

    #scene4 .frame {
      display: grid;
      place-items: center;
      padding: 16px 14px 96px;
      position: relative;
    }

    .scene4-floral {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(320px, 92vw);
      height: min(72px, 11vh);
      pointer-events: none;
      z-index: 1;
      opacity: 0.38;
    }

    .scene4-floral svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(100, 72, 28, 0.12));
    }

    .scene4-floral-top {
      top: max(10px, env(safe-area-inset-top));
    }

    .scene4-floral-bottom {
      bottom: max(92px, calc(env(safe-area-inset-bottom) + 76px));
    }

    .detail-panel {
      width: min(90vw, 390px);
      background: linear-gradient(165deg, #fffefb, #f8efdf 62%, #f4e8d3);
      border-radius: 22px;
      border: 1px solid rgba(182, 138, 61, 0.34);
      box-shadow: var(--shadow-deep);
      padding: 30px 24px 28px;
      text-align: center;
      color: var(--ink);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 1200ms var(--lux-ease), transform 1200ms var(--lux-ease);
    }

    #scene4.show .detail-panel {
      opacity: 1;
      transform: translateY(0);
    }

    #scene4.show .scene4-floral {
      opacity: 0.38;
    }

    #scene4 .detail-panel {
      position: relative;
      z-index: 2;
    }

    #scene4 .reopen-btn {
      position: absolute;
      z-index: 7;
    }

    .panel-kicker {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8e6a2f;
      margin: 0;
    }

    .panel-title {
      font-size: clamp(1.8rem, 8vw, 2.4rem);
      margin: 8px 0 6px;
      font-weight: 500;
      color: #5a4324;
    }

    .gold-line {
      width: 0;
      height: 2px;
      margin: 12px auto 16px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transition: width 1400ms var(--lux-ease);
      transition-delay: 360ms;
    }

    #scene4.show .gold-line {
      width: 112px;
    }

    .fade-item {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 900ms var(--lux-ease), transform 900ms var(--lux-ease);
    }

    #scene4.show .fade-1 {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 200ms;
    }

    #scene4.show .fade-2 {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 520ms;
    }

    #scene4.show .fade-3 {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 840ms;
    }

    .label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #937038;
      margin-bottom: 3px;
    }

    .value {
      font-size: 1rem;
      margin: 0 0 12px;
      color: #5b4325;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .value.venue {
      font-size: 0.92rem;
      color: #634a29;
    }

    .reopen-btn {
      position: absolute;
      left: 50%;
      bottom: max(20px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      border: 1px solid rgba(182, 138, 61, 0.55);
      background: linear-gradient(180deg, #fffaf0, #f3e1be);
      color: #6a4d23;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(120, 81, 23, 0.2);
      transition: transform 260ms var(--lux-ease), box-shadow 260ms var(--lux-ease), opacity 350ms var(--lux-ease);
      opacity: 0;
      pointer-events: none;
      z-index: 7;
    }

    #scene4.show .reopen-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .reopen-btn:active {
      transform: translateX(-50%) translateY(1px) scale(0.99);
      box-shadow: 0 5px 14px rgba(120, 81, 23, 0.2);
    }

    @keyframes slowZoom {
      from { transform: scale(1.03); }
      to { transform: scale(1.1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.74; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-3px); }
    }

  </style>
</head>

  <script>
    const scene1 = document.getElementById("scene1");
    const scene2 = document.getElementById("scene2");
    const scene4 = document.getElementById("scene4");
    const startLayer = document.getElementById("startLayer");
    const reopenBtn = document.getElementById("reopenBtn");
    const envelopeOpen = document.getElementById("envelopeOpen");
    const bgMusic = document.getElementById("bgMusic");
    const paperSfx = document.getElementById("paperSfx");
    let started = false;

    function setActive(target) {
      [scene1, scene2, scene4].forEach((scene) => scene.classList.remove("active"));
      target.classList.add("active");
    }

    function startReel() {
      if (started) return;
      started = true;

      bgMusic.play().catch(() => {});
      if (paperSfx.getAttribute("src")) {
        paperSfx.play().catch(() => {});
      }

      scene1.classList.add("blur-fade");

      setTimeout(() => {
        setActive(scene2);
        requestAnimationFrame(() => envelopeOpen.classList.add("open"));

        setTimeout(() => {
          scene2.classList.add("zoom-in");

          setTimeout(() => {
            setActive(scene4);
            scene4.classList.add("show");
          }, 900);
        }, 3300);
      }, 920);
    }

    function resetReel() {
      started = false;
      scene1.classList.remove("blur-fade");
      scene2.classList.remove("zoom-in");
      scene4.classList.remove("show");
      envelopeOpen.classList.remove("open");
      setActive(scene1);
    }

    startLayer.addEventListener("click", startReel);
    reopenBtn.addEventListener("click", resetReel);
  </script>
